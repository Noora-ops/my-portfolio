<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>张雨婷的作品集 | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.284.0"
        }
      }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body { margin: 0; background: #000; color: white; font-family: sans-serif; }
      #root { min-height: 100vh; }
      .loading { display: flex; justify-content: center; align-items: center; height: 100vh; font-size: 1.2rem; }
    </style>
  </head>
  <body>
    <div id="root"><div class="loading">正在最后初始化，请稍候...</div></div>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect } from 'react';
      import ReactDOM from 'react-dom/client';
      import * as Icons from 'lucide-react';

      // 备用方案：如果 App.jsx 加载失败，直接显示一个简单的提示
      const FallbackApp = () => (
        <div className="p-10 text-center">
          <h1 className="text-3xl font-bold mb-4">张雨婷的作品集</h1>
          <p className="text-gray-400">正在尝试从 src/App.jsx 读取详细内容...</p>
        </div>
      );

      async function init() {
        let App;
        try {
          // 强制加上时间戳，击穿所有缓存
          const module = await import(`./src/App.jsx?t=${Date.now()}`);
          App = module.default;
        } catch (e) {
          console.error("无法加载 App.jsx，使用内置模板", e);
          App = FallbackApp;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
      }

      init();
    </script>
  </body>
</html>
