<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>张雨婷的作品集 | ZHANG YUTING Portfolio</title>
    <!-- 引入 Tailwind CSS 进行样式渲染 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Map: 确保浏览器能识别 React 和图标库 -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.284.0"
        }
      }
    </script>
    <style>
      /* 这里的样式是为了确保在加载过程中页面不闪烁 */
      body { margin: 0; background-color: white; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React from 'react';
      import ReactDOM from 'react-dom/client';
      
      /** * 重要：这里引用的路径 './src/App.jsx' 
       * 必须对应你 GitHub 仓库中 src 文件夹下的 App.jsx 文件
       */
      import App from './src/App.jsx';

      const rootElement = document.getElementById('root');
      if (rootElement) {
        ReactDOM.createRoot(rootElement).render(
          React.createElement(React.StrictMode, null, React.createElement(App))
        );
      }
    </script>
  </body>
</html>
