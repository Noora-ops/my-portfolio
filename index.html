<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>张雨婷的作品集 | ZHANG YUTING Portfolio</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Map: 修正了括号错误并确保模块解析 -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.284.0"
        }
      }
    </script>
    
    <!-- 引入 Babel 编译器 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
      body { margin: 0; background-color: white; min-height: 100vh; overflow-x: hidden; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- 这里的 type 必须是 text/babel，data-type 必须是 module -->
    <script type="text/babel" data-type="module">
      import React from 'react';
      import ReactDOM from 'react-dom/client';
      
      /**
       * 路径优化：
       * 使用基于根目录的路径 '/src/App.jsx'，避免相对路径导致的问题
       */
      import App from '/src/App.jsx';

      const AppContainer = () => {
        return (
          <React.Suspense fallback={<div style={{padding: '20px', textAlign: 'center'}}>加载中...</div>}>
            <App />
          </React.Suspense>
        );
      };

      const rootElement = document.getElementById('root');
      if (rootElement) {
        const root = ReactDOM.createRoot(rootElement);
        root.render(<AppContainer />);
      }
    </script>
  </body>
</html>
